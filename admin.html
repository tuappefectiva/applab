<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Pedidos</title>

<style>
body {
  font-family: Arial;
  background:#f4f4f4;
  padding:20px;
}
h1 { color:#004832; }

.config {
  background:#fff3cd;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
}

button {
  background:#004832;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:999px;
  margin-top:10px;
  cursor:pointer;
}

.pedido {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-left:5px solid #004832;
}
</style>
</head>

<body>

<h1>Pedidos realizados</h1>

<div class="config">
  <h3>Configuración</h3>
  <input id="binId" placeholder="BIN ID">
  <input id="apiKey" placeholder="API KEY">
  <button onclick="guardar()">Guardar</button>
</div>

<button onclick="cargar()">Actualizar</button>
<button onclick="limpiar()">Limpiar todo</button>

<div id="zona"></div>

<script>
let config = null;

function guardar() {
  const binId = document.getElementById('binId').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();

  if (!binId || !apiKey) {
    alert("Completa los datos");
    return;
  }

  config = { binId, apiKey };

  // ✅ CORREGIDO
  localStorage.setItem("jsonbin_config", JSON.stringify(config));

  alert("Guardado correctamente");

  cargar();
}

function cargarConfig() {
  const data = localStorage.getItem("jsonbin_config");
  if (data) {
    config = JSON.parse(data);
    document.getElementById('binId').value = config.binId;
    document.getElementById('apiKey').value = config.apiKey;
  }
}

async function cargar() {
  if (!config) {
    alert("Configura primero");
    return;
  }

  const zona = document.getElementById('zona');
  zona.innerHTML = "Cargando...";

  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}/latest`, {
      headers: {
        "X-Master-Key": config.apiKey
      }
    });

    if (!res.ok) throw new Error(res.status);

    const data = await res.json();
    const pedidos = data.record?.pedidos || [];

    zona.innerHTML = "";

    if (pedidos.length === 0) {
      zona.innerHTML = "Sin pedidos";
      return;
    }

    pedidos.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "pedido";

      div.innerHTML = `
        <b>Pedido ${i+1}</b><br>
        ${p.ubicacion} <br>
        ${p.productos.join("<br>")}
        <br><br>
        <button onclick="eliminar(${i})">Eliminar</button>
      `;

      zona.appendChild(div);
    });

  } catch (e) {
    console.error(e);
    zona.innerHTML = "❌ Error (revisa BIN y API KEY)";
  }
}

async function eliminar(index) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}/latest`, {
    headers: { "X-Master-Key": config.apiKey }
  });

  const data = await res.json();
  const pedidos = data.record.pedidos || [];

  pedidos.splice(index, 1);

  await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": config.apiKey
    },
    body: JSON.stringify({ pedidos })
  });

  cargar();
}

async function limpiar() {
  await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": config.apiKey
    },
    body: JSON.stringify({ pedidos: [] })
  });

  cargar();
}

cargarConfig();
if (config) cargar();
</script>

</body>
</html>
