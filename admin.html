<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Administración — Pedidos</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
h1 { color:#004832; }
.pedido { background:#fff; border-left:5px solid #004832; padding:15px; margin-bottom:15px; border-radius:8px; }
.ubicacion { background:#b9e6b9; padding:4px 10px; border-radius:999px; margin-left:10px; }
.btn { background:#004832; color:#fff; border:none; border-radius:999px; padding:10px 20px; cursor:pointer; margin-right:10px; }
.btn-eliminar { background:#e74c3c; }
.config { background:#fff3cd; padding:15px; border-radius:8px; margin-bottom:20px; }
input { width:100%; padding:10px; margin-top:10px; }
.loading { font-weight:bold; }
</style>
</head>

<body>

<h1>Pedidos realizados</h1>

<div class="config" id="configPanel">
  <h3>Configuración</h3>
  <input id="binId" placeholder="BIN ID">
  <input id="apiKey" placeholder="API KEY">
  <button class="btn" onclick="guardarConfig()">Guardar</button>
</div>

<button class="btn" onclick="cargarPedidos()">Actualizar</button>
<button class="btn" onclick="limpiarTodo()">Limpiar todo</button>

<div id="zonaPedidos"></div>

<script>

const CONFIG_KEY = 'jsonbin_config';
let config = null;

function cargarConfiguracion() {
  const stored = localStorage.getItem(CONFIG_KEY);
  if (stored) {
    config = JSON.parse(stored);
    document.getElementById('configPanel').style.display = 'none';
  }
}

function guardarConfig() {
  const binId = document.getElementById('binId').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();

  if (!binId || !apiKey) {
    alert("Completa ambos campos");
    return;
  }

  config = { binId, apiKey };
  localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); // ✅ CORREGIDO

  document.getElementById('configPanel').style.display = 'none';
  cargarPedidos();
}

async function cargarPedidos() {
  if (!config) return;

  const zona = document.getElementById('zonaPedidos');
  zona.innerHTML = '<div class="loading">Cargando...</div>';

  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}/latest`, {
      headers: { 'X-Master-Key': config.apiKey }
    });

    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    const data = await res.json();

    // ✅ Protección extra
    const pedidos = (data.record && data.record.pedidos) ? data.record.pedidos : [];

    zona.innerHTML = '';

    if (pedidos.length === 0) {
      zona.innerHTML = '<p>No hay pedidos</p>';
      return;
    }

    pedidos.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'pedido';

      div.innerHTML = `
        <h3>Pedido ${i+1} ${p.ubicacion ? `<span class="ubicacion">${p.ubicacion}</span>`:''}</h3>
        <small>${p.fecha || ''}</small>
        <ul>${p.productos.map(x => `<li>${x}</li>`).join('')}</ul>
        <button class="btn btn-eliminar" onclick="eliminar(${i})">Eliminar</button>
      `;

      zona.appendChild(div);
    });

  } catch (e) {
    zona.innerHTML = `<p style="color:red;">Error: ${e.message}</p>`;
    console.error(e);
  }
}

async function eliminar(index) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}/latest`, {
    headers: { 'X-Master-Key': config.apiKey }
  });

  const data = await res.json();
  const pedidos = data.record.pedidos || [];

  pedidos.splice(index, 1);

  await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': config.apiKey
    },
    body: JSON.stringify({ pedidos })
  });

  cargarPedidos();
}

async function limpiarTodo() {
  await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': config.apiKey
    },
    body: JSON.stringify({ pedidos: [] })
  });

  cargarPedidos();
}

cargarConfiguracion();
if (config) cargarPedidos();

</script>

</body>
</html>
