<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f9;
  padding:20px;
}

h1 {
  color:#004832;
}

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

button {
  background:#004832;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:999px;
  cursor:pointer;
}

select {
  padding:10px;
  border-radius:8px;
}

.stats {
  margin-bottom:15px;
  font-weight:bold;
}

.pedido {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.ubicacion {
  background:#b9e6b9;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
}

.fecha {
  font-size:12px;
  color:#666;
}

.empty {
  text-align:center;
  color:#999;
  padding:20px;
}
</style>
</head>

<body>

<h1>📦 Panel de Pedidos</h1>

<div class="topbar">
  <button onclick="cargar()">🔄 Actualizar</button>
  <button onclick="limpiar()">🗑️ Limpiar todo</button>

  <select id="filtro">
    <option value="">Todas las ubicaciones</option>
    <option value="Almería">Almería</option>
    <option value="Águilas">Águilas</option>
  </select>
</div>

<div class="stats" id="stats"></div>

<div id="zona"></div>

<script>
const config = {
  binId: '69c109d4c3097a1dd54f2a17',
  apiKey: '$2a$10$pQZ95V9v7uzCApZinQK1duBWYbs0K5CA01FfBphmSnlHapcrOU6x.'
};

let pedidosGlobal = [];

async function cargar() {

  const zona = document.getElementById('zona');
  zona.innerHTML = "Cargando...";

  try {

    const res = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}/latest`, {
      headers: { 'X-Master-Key': config.apiKey }
    });

    if (!res.ok) throw new Error(res.status);

    const data = await res.json();

    pedidosGlobal = data.record?.pedidos || [];

    // 🔥 ordenar por fecha DESC
    pedidosGlobal.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

    render();

  } catch (e) {
    console.error(e);
    zona.innerHTML = "❌ Error cargando pedidos";
  }
}

function render() {

  const filtro = document.getElementById('filtro').value;
  const zona = document.getElementById('zona');

  let pedidos = pedidosGlobal;

  if (filtro) {
    pedidos = pedidos.filter(p => p.ubicacion === filtro);
  }

  document.getElementById('stats').innerText =
    `Total pedidos: ${pedidos.length}`;

  zona.innerHTML = "";

  if (pedidos.length === 0) {
    zona.innerHTML = '<div class="empty">No hay pedidos</div>';
    return;
  }

  pedidos.forEach((p, i) => {

    const div = document.createElement('div');
    div.className = 'pedido';

    div.innerHTML = `
      <div class="header">
        <b>Pedido</b>
        <span class="ubicacion">${p.ubicacion}</span>
      </div>

      <div class="fecha">
        ${new Date(p.fecha).toLocaleString()}
      </div>

      <hr>

      ${p.productos.map(x => `• ${x}`).join("<br>")}

      <br><br>
      <button onclick="eliminar(${i})">Eliminar</button>
    `;

    zona.appendChild(div);
  });
}

async function eliminar(index) {

  const pedidos = [...pedidosGlobal];
  pedidos.splice(index, 1);

  await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
    method:'PUT',
    headers:{
      'Content-Type':'application/json',
      'X-Master-Key': config.apiKey
    },
    body: JSON.stringify({ pedidos })
  });

  cargar();
}

async function limpiar() {

  if (!confirm("¿Eliminar todo?")) return;

  await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
    method:'PUT',
    headers:{
      'Content-Type':'application/json',
      'X-Master-Key': config.apiKey
    },
    body: JSON.stringify({ pedidos: [] })
  });

  cargar();
}

document.getElementById('filtro').addEventListener('change', render);

cargar();
</script>

</body>
</html>
