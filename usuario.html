<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Usuario — Laboratorio</title>

<style>
body { font-family: Arial; background:#b9e6b9; padding:20px; }
.card { background:#fff; border-radius:10px; padding:15px; margin-bottom:20px; }
button { background:#004832; color:#fff; border:none; border-radius:999px; padding:10px 20px; cursor:pointer; }
.remove-btn { background:#e74c3c; margin-left:10px; }
.empty-list { color:#999; text-align:center; }
.loading { display:none; font-weight:bold; }
</style>
</head>

<body>

<h1>Usuario — Laboratorio</h1>

<div class="card">
<select id="ubicacion">
<option value="" disabled selected>Selecciona ubicación</option>
<option>Almería</option>
<option>Águilas</option>
</select>
</div>

<div class="card">
<input id="buscador" placeholder="Buscar..." />
<select id="productos"></select>
<button onclick="agregarDesdeSelector()">Añadir</button>
</div>

<div class="card">
<textarea id="manualInput" placeholder="Manual"></textarea>
<button onclick="agregarDesdeManual()">Añadir manual</button>
</div>

<div class="card">
<ul id="listaProductos">
<li class="empty-list">No hay productos</li>
</ul>
<button id="btnPedido" onclick="hacerPedido()">Enviar pedido</button>
<div class="loading" id="loading">Enviando...</div>
</div>

<script>

const config = {
  binId: '69c109d4c3097a1dd54f2a17',
  apiKey: '$2a$10$pQZ95V9v7uzCApZinQK1duBWYbs0K5CA01FfBphmSnlHapcrOU6x.'
};

let productosOriginales = [];

async function cargarProductos() {
  try {
    const res = await fetch('productos_usuario_limpio.json');
    const data = await res.json();
    productosOriginales = data;
    actualizarSelect(data);
  } catch {
    document.getElementById('productos').innerHTML = '<option>Error</option>';
  }
}

function actualizarSelect(productos) {
  const select = document.getElementById('productos');
  select.innerHTML = '<option disabled selected>Selecciona</option>';

  productos.forEach(p => {
    const text = `${p.nombre} (${p.codigo})`;
    const opt = document.createElement('option');
    opt.value = text;
    opt.textContent = text;
    select.appendChild(opt);
  });
}

function agregarALista(texto) {
  const ul = document.getElementById('listaProductos');

  const empty = ul.querySelector('.empty-list');
  if (empty) empty.remove();

  const li = document.createElement('li');

  const span = document.createElement('span');
  span.textContent = texto;

  const btn = document.createElement('button');
  btn.textContent = 'X';
  btn.className = 'remove-btn';

  btn.onclick = () => {
    li.remove();
    if (ul.children.length === 0) {
      ul.innerHTML = '<li class="empty-list">No hay productos</li>';
    }
  };

  li.appendChild(span);
  li.appendChild(btn);
  ul.appendChild(li);
}

function agregarDesdeSelector() {
  const select = document.getElementById('productos');
  const val = select.value;

  if (!val) return alert('Selecciona producto');

  agregarALista(val);

  // ✅ reset selector
  select.selectedIndex = 0;
}

function agregarDesdeManual() {
  const val = document.getElementById('manualInput').value.trim();
  if (!val) return alert('Escribe algo');

  agregarALista(val);
  document.getElementById('manualInput').value = '';
}

async function hacerPedido() {

  const ubicacion = document.getElementById('ubicacion').value;
  if (!ubicacion) return alert('Selecciona ubicación');

  const items = Array.from(
    document.querySelectorAll('#listaProductos li span')
  ).map(x => x.textContent);

  if (items.length === 0) return alert('Lista vacía');

  const pedido = {
    productos: items,
    ubicacion,
    fecha: new Date().toISOString()
  };

  document.getElementById('loading').style.display = 'block';
  document.getElementById('btnPedido').disabled = true;

  try {

    // 🔹 LEER BIN
    const res = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}/latest`, {
      headers: { 'X-Master-Key': config.apiKey }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    // ✅ SOLUCIÓN CLAVE: inicializar correctamente
    let pedidos = [];

    if (data.record && Array.isArray(data.record.pedidos)) {
      pedidos = data.record.pedidos;
    } else {
      pedidos = [];
    }

    pedidos.push(pedido);

    // 🔹 GUARDAR
    const save = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': config.apiKey
      },
      body: JSON.stringify({ pedidos })
    });

    if (!save.ok) throw new Error(`SAVE ${save.status}`);

    document.getElementById('listaProductos').innerHTML =
      '<li class="empty-list">No hay productos</li>';

    alert('✅ Pedido enviado correctamente');

  } catch (e) {

    console.error(e);

    let msg = 'Error desconocido';

    if (e.message.includes('404')) msg = 'BIN no existe';
    if (e.message.includes('401')) msg = 'API KEY incorrecta';

    alert('❌ ' + msg);

  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btnPedido').disabled = false;
  }
}

document.getElementById('buscador').addEventListener('input', function () {
  const f = this.value.toLowerCase();

  actualizarSelect(
    productosOriginales.filter(p =>
      `${p.nombre} (${p.codigo})`.toLowerCase().includes(f)
    )
  );
});

cargarProductos();

</script>
